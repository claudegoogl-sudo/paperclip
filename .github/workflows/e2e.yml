name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM-dependent assertions (default: true)"
        type: boolean
        default: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PAPERCLIP_E2E_SKIP_LLM: ${{ inputs.skip_llm && 'true' || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      # PLA-597: do not specify `version:` here. package.json declares
      # `packageManager: pnpm@9.15.4`; pnpm/action-setup errors with
      # ERR_PNPM_BAD_PM_VERSION when both are present. Matches pr.yml which
      # also lets the packageManager field win. (Upstream v6 action bump
      # taken; fork-only no-version gate re-applied.)
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: google-chrome --version

      - name: Run e2e tests
        env:
          PAPERCLIP_PLAYWRIGHT_CHANNEL: "chrome"
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14
